<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkrra Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        :root {
            --primary: #8C52FF;
            --secondary: #F98C49;
            --bg: #0A0A0B;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* The Phone Frame */
        .phone-container {
            width: 300px;
            height: 620px;
            background: #000;
            border: 10px solid #1A1A1E;
            border-radius: 44px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        /* Prototype Content Area */
        .app-layers {
            width: 100%;
            height: 100%;
            position: relative;
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        /* Animated Aura Background */
        .aura {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 50% 50%, rgba(140, 82, 255, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(249, 140, 73, 0.15) 0%, transparent 40%);
            filter: blur(60px);
            z-index: 0;
            animation: auraRotate 15s infinite linear;
        }

        @keyframes auraRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .scrollable {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 1;
            scrollbar-width: none;
            padding: 20px;
        }
        .scrollable::-webkit-scrollbar { display: none; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: 5px;
        }
        .logo { 
            height: 60px; 
            filter: drop-shadow(0 4px 15px rgba(140, 82, 255, 0.4));
        }
        .menu-icon { opacity: 0.6; }

        /* User Profile Case */
        .profile-hero {
            text-align: center;
            margin-bottom: 32px;
        }
        .avatar-case {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 16px;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 3px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
        }
        .verified-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #007AFF;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #000;
        }
        .verified-badge span { font-size: 14px; }

        .name { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .bio { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 500; }

        /* Interactive Prototype Elements */
        .link-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.02);
        }

        .icon-box {
            width: 44px;
            height: 44px;
            background: rgba(140, 82, 255, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .link-info h4 { font-size: 14px; margin-bottom: 2px; }
        .link-info p { font-size: 11px; opacity: 0.5; }

        /* Prototype Cursor */
        #proto-cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            border: 1px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            display: none;
        }

        /* Notification Pop */
        .toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Dynamic Island Simulation */
        .island {
            width: 80px;
            height: 24px;
            background: #000;
            border-radius: 20px;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.3s ease;
        }
        .island.expanded { width: 140px; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div id="proto-cursor"></div>
        <div id="payment-toast" class="toast">
            <span class="material-symbols-outlined" style="color: #4CAF50">check_circle</span>
            Payment of $45 Received!
        </div>

        <div class="app-layers">
            <div class="aura"></div>
            
            <!-- Phone Top -->
            <div class="island" id="dynamic-island"></div>

            <div class="scrollable" id="scroll-area">
                <div class="header">
                    <img src="logo.png" class="logo" alt="logo">
                    <span class="material-symbols-outlined menu-icon">sort</span>
                </div>

                <div class="profile-hero">
                    <div class="avatar-case">
                        <div class="avatar-img">JD</div>
                        <div class="verified-badge"><span class="material-symbols-outlined">done</span></div>
                    </div>
                    <h2 class="name">Jordan Design</h2>
                    <p class="bio">Digital creator & minimalist enthusiast</p>
                </div>

                <div class="link-card" id="link-1">
                    <div class="icon-box"><span class="material-symbols-outlined">shopping_bag</span></div>
                    <div class="link-info">
                        <h4>Premium Presets</h4>
                        <p>Latest Lightroom collection</p>
                    </div>
                </div>

                <div class="link-card" id="link-2">
                    <div class="icon-box" style="color: #F98C49; background: rgba(249, 140, 73, 0.15);"><span class="material-symbols-outlined">credit_score</span></div>
                    <div class="link-info">
                        <h4>Book a Session</h4>
                        <p>1-on-1 strategy call</p>
                    </div>
                </div>

                <div class="link-card" id="link-3">
                    <div class="icon-box" style="color: #64B5F6; background: rgba(100, 181, 246, 0.15);"><span class="material-symbols-outlined">alternate_email</span></div>
                    <div class="link-info">
                        <h4>Join Newsletter</h4>
                        <p>Weekly design tips & tricks</p>
                    </div>
                </div>

                <div style="height: 100px;"></div>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('proto-cursor');
        const scrollArea = document.getElementById('scroll-area');
        const island = document.getElementById('dynamic-island');
        const toast = document.getElementById('payment-toast');

        function moveCursor(x, y) {
            cursor.style.display = 'block';
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
        }

        async function startPrototype() {
            // Wait for load
            await new Promise(r => setTimeout(r, 1000));

            // Move to first card
            const card1 = document.getElementById('link-1');
            const rect1 = card1.getBoundingClientRect();
            moveCursor(rect1.left + 50, rect1.top + 20);
            
            await new Promise(r => setTimeout(r, 800));
            card1.style.background = 'rgba(255,255,255,0.15)';
            card1.style.transform = 'scale(0.98)';

            // Simulate Payment Pop
            await new Promise(r => setTimeout(r, 300));
            island.classList.add('expanded');
            toast.classList.add('show');
            
            await new Promise(r => setTimeout(r, 2000));
            toast.classList.remove('show');
            island.classList.remove('expanded');
            card1.style.background = '';
            card1.style.transform = '';

            // Scroll down
            await new Promise(r => setTimeout(r, 500));
            scrollArea.scrollTo({ top: 100, behavior: 'smooth' });

            // Restart after delay
            setTimeout(startPrototype, 3000);
        }

        startPrototype();
    </script>
</body>
</html>
